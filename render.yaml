services:
  - type: web
    name: tara-finance-agent
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tara-finance-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: tara-finance-db
    plan: starter
    databaseName: provue_tara
    user: provue_tara_user
